<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="engine.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Calculator">
        <div class="display">
            <div class="up-display">
                <p class="input">71981541</p>
            </div>
            <p class="output">81719618</p>
        </div>
        <div class="body">
            <div class="num-pad">
                <div class="numerical"></div>
                <div class="special-character">
                    <button>
                        CE
                    </button>
                    <button>
                        .
                    </button>
                    <button class="number">
                        0
                    </button>
                </div>
            </div>
            <div class="side-panel">
                <div class="operator">
                <button>
                    /
                </button>
                <button>
                    *                    
                </button>
                <button>
                    +
                </button>
                <button>
                    -
                </button>
            </div>
            <button id="Equal">
                    =
                </button>
            </div>
        </div>
    </div>
</body>
</html>
